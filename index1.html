<!DOCTYPE html>
<html>
<head>

<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
}

/* ✅ Correct background name */

body{
background-image:url("background2.jpeg");
background-size:cover;
background-position:center center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
padding:50px 10px;
}

/* Gallery */

.gallery{
max-width:400px;
margin:auto;
}

/* Photo card */

.card{
background:white;
padding:10px;
margin:40px 0;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

/* Image */

.card img{
width:100%;
border-radius:8px;
}

/* Caption (pickup line space) */

.caption{
height:50px;
background:white;
margin-top:8px;
border-radius:6px;
}

/* Tilt effect */

.left{
transform:rotate(-4deg);
}

.right{
transform:rotate(4deg);
}

/* Hover */

.card:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="gallery">

<div class="card left">
<img src="01.jpg">
<div class="caption"></div>
</div>

<div class="card right">
<img src="02.jpg">
<div class="caption"></div>
</div>

<div class="card left">
<img src="03.jpg">
<div class="caption"></div>
</div>

<div class="card right">
<img src="04.jpg">
<div class="caption"></div>
</div>

<div class="card left">
<img src="05.jpg">
<div class="caption"></div>
</div>

<div class="card right">
<img src="06.jpg">
<div class="caption"></div>
</div>

<div class="card left">
<img src="07.jpg">
<div class="caption"></div>
</div>

</div>

</body>
</html>
